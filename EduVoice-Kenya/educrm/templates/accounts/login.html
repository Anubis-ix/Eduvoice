<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — EduVoice Kenya</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1a6b3c 0%, #145530 50%, #0d3d22 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .login-card { background: white; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { font-size: 1.75rem; font-weight: 700; color: #1a6b3c; }
    .logo p { color: #6b7280; font-size: 0.9rem; margin-top: 4px; }
    .logo .emoji { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; }
    input { width: 100%; padding: 0.7rem 1rem; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 0.95rem; font-family: inherit; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: #1a6b3c; }
    .btn { width: 100%; padding: 0.8rem; background: #1a6b3c; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; margin-top: 0.5rem; }
    .btn:hover { background: #145530; }
    .links { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: #6b7280; }
    .links a { color: #1a6b3c; text-decoration: none; font-weight: 600; }
    .alert { padding: 0.75rem 1rem; background: #fee2e2; color: #991b1b; border-radius: 8px; font-size: 0.875rem; margin-bottom: 1rem; border-left: 4px solid #ef4444; }
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: #9ca3af; font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
    .badge-strip { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
    .badge-student { background: #d1fae5; color: #065f46; }
    .badge-teacher { background: #dbeafe; color: #1e40af; }
    .badge-parent { background: #fef3c7; color: #92400e; }
    .badge-admin { background: #ede9fe; color: #5b21b6; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <span class="emoji">🎓</span>
    <h1>EduVoice Kenya</h1>
    <p>Student & Teacher Feedback System</p>
  </div>

  <div class="badge-strip">
    <span class="badge badge-student">Students</span>
    <span class="badge badge-teacher">Teachers</span>
    <span class="badge badge-parent">Parents</span>
    <span class="badge badge-admin">Admins</span>
  </div>

  {% for message in messages %}
    <div class="alert">{{ message }}</div>
  {% endfor %}

  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter your username" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn">Sign In →</button>
  </form>

  <div class="links">
    Don't have an account? <a href="{% url 'register' %}">Register here</a>
  </div>
</div>
</body>
</html>
