{% extends 'base.html' %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="page-header"><h1>👤 My Profile</h1></div>
<div class="card" style="max-width:500px;">
  <div class="form-group"><label class="form-label">Full Name</label><div class="form-control" style="background:#f9fafb;">{{ user.get_full_name }}</div></div>
  <div class="form-group"><label class="form-label">Username</label><div class="form-control" style="background:#f9fafb;">{{ user.username }}</div></div>
  <div class="form-group"><label class="form-label">Role</label><div class="form-control" style="background:#f9fafb;">{{ user.get_role_display }}</div></div>
  <div class="form-group"><label class="form-label">School</label><div class="form-control" style="background:#f9fafb;">{{ user.school }}</div></div>
  <div class="form-group"><label class="form-label">Email</label><div class="form-control" style="background:#f9fafb;">{{ user.email|default:"Not set" }}</div></div>
  <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Sign Out</a>
</div>
{% endblock %}
